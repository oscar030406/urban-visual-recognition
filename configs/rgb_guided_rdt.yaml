name: rgb-guided-rdt-yolo11m
fusion: rgb_guided_rdt
model: yolo11m.pt
imgsz: 1536
batch: auto-free
workers: 16
epochs: 100
seed: 42
prepare_args:
  modality_dropout: false
depth_normalization:
  uint16: clamp millimeter depth to 100-20000 and map to uint8
  uint8: preserve depth intensity and use nonzero valid mask
fusion_design:
  output: RGB-like 3-channel image
  rgb: keep original color channels
  infrared: CLAHE-enhanced saliency guidance
  depth: valid near-depth saliency guidance
  gate: rgb * (0.85 + 0.30 * smoothed_attention)
notes: Preserves COCO-pretrained RGB filters while using infrared and depth as spatial guidance.
